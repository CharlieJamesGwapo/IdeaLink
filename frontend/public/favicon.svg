  <!-- Orange accent top bar -->
  <rect x="10" y="8" width="44" height="3" rx="1.5" fill="#F47C20" opacity="0.35"/>
  <!-- "i" dot -->
  <circle cx="22" cy="19" r="3.5" fill="#F47C20"/>
  <!-- "i" stem -->
  <rect x="19" y="25" width="6" height="22" rx="3" fill="#F47C20"/>
  <!-- "L" vertical -->
  <rect x="33" y="16" width="6" height="31" rx="3" fill="white" opacity="0.9"/>
  <!-- "L" horizontal foot -->
  <rect x="33" y="41" width="16" height="6" rx="3" fill="white" opacity="0.9"/>
  <!-- Bottom accent -->
  <rect x="10" y="53" width="44" height="3" rx="1.5" fill="#F47C20" opacity="0.25"/>
</svg>
