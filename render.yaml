services:
  - type: web
    name: idealink-backend
    runtime: go
    plan: free
    region: sgp
    rootDir: backend
    buildCommand: go build -o server ./cmd/
    startCommand: ./server
    healthCheckPath: /api/announcements
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: idealink-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false   # REQUIRED: set to your Netlify URL in the Render dashboard before going live

databases:
  - name: idealink-db
    plan: free
    region: sgp
