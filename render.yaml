services:
  - type: web
    name: idealink-backend
    runtime: go
    rootDir: backend
    buildCommand: go build -o server ./cmd/main.go
    startCommand: ./server
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: idealink-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false

databases:
  - name: idealink-db
    plan: free
